<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LCARS Responsive Test</title>
  <style>
    body { font-family: Consolas, monospace; background: #111; color: #eee; padding: 16px; }
    iframe { border: 1px solid #333; display: block; margin-bottom: 16px; }
  </style>
</head>
<body>
  <pre id="results">running...</pre>
  <iframe id="mobile" src="index.html" style="width:390px;height:2200px"></iframe>
  <iframe id="desktop" src="index.html" style="width:1440px;height:1600px"></iframe>
  <script>
    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function waitForFrame(frame) {
      if (frame.contentDocument && frame.contentDocument.readyState === 'complete') {
        return;
      }
      await new Promise((resolve) => frame.addEventListener('load', resolve, { once: true }));
    }

    async function measureFrame(frame) {
      await waitForFrame(frame);
      await wait(300);
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      return {
        innerWidth: win.innerWidth,
        docClientWidth: doc.documentElement.clientWidth,
        docScrollWidth: doc.documentElement.scrollWidth,
        bodyScrollWidth: doc.body.scrollWidth,
        hasHorizontalOverflow: doc.documentElement.scrollWidth > doc.documentElement.clientWidth,
        stageWidth: doc.getElementById('stage-display')?.getBoundingClientRect().width,
        shellWidth: doc.querySelector('.lcars-shell')?.getBoundingClientRect().width,
      };
    }

    async function run() {
      const mobileFrame = document.getElementById('mobile');
      const desktopFrame = document.getElementById('desktop');
      const mobile = await measureFrame(mobileFrame);
      const desktop = await measureFrame(desktopFrame);
      document.getElementById('results').textContent = JSON.stringify({ mobile, desktop }, null, 2);
      document.title = 'LCARS Responsive Test Complete';
    }

    run().catch((error) => {
      document.getElementById('results').textContent = JSON.stringify({ fatal: String(error) }, null, 2);
      document.title = 'LCARS Responsive Test Failed';
    });
  </script>
</body>
</html>
