<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LCARS Interaction Test</title>
  <style>
    body { font-family: Consolas, monospace; background: #111; color: #eee; padding: 16px; }
    iframe { width: 1440px; height: 1400px; border: 1px solid #333; }
  </style>
</head>
<body>
  <pre id="results">running...</pre>
  <iframe id="app" src="index.html"></iframe>
  <script>
    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function run() {
      const frame = document.getElementById('app');
      if (!(frame.contentDocument && frame.contentDocument.readyState === 'complete')) {
        await new Promise((resolve) => frame.addEventListener('load', resolve, { once: true }));
      }
      await wait(300);
      const doc = frame.contentDocument;
      const samples = [];
      const capture = (label) => {
        samples.push({
          label,
          firingCount: doc.querySelectorAll('.is-firing').length,
          switching: doc.getElementById('stage-display')?.classList.contains('is-switching'),
          activeStations: Array.from(doc.querySelectorAll('.station-button.is-active')).map((el) => el.textContent.trim()),
          lastCommand: doc.getElementById('last-command')?.textContent?.trim(),
        });
      };

      const scienceButton = doc.querySelector('.station-button[data-screen="science"]');
      scienceButton.click();
      capture('nav immediate');
      await wait(80);
      capture('nav 80ms');
      await wait(320);
      capture('nav settled');

      const sweepButton = doc.querySelector('.command-button[data-command="sensors.sweep"]');
      sweepButton.click();
      capture('command immediate');
      await wait(80);
      capture('command 80ms');
      await wait(500);
      capture('command settled');

      document.getElementById('results').textContent = JSON.stringify(samples, null, 2);
      document.title = 'LCARS Interaction Test Complete';
    }

    run().catch((error) => {
      document.getElementById('results').textContent = JSON.stringify({ fatal: String(error) }, null, 2);
      document.title = 'LCARS Interaction Test Failed';
    });
  </script>
</body>
</html>
