<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCARS Review Pack</title>
  <style>
    :root {
      --bg: #0a0a0d;
      --panel: #15151b;
      --line: #2a2a35;
      --text: #f4ead8;
      --muted: #c0b09b;
      --peach: #f0b28d;
      --lilac: #b59bd4;
      --blue: #8ac7d8;
      --gold: #c6a15d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .hero {
      background: var(--panel);
      border-left: 28px solid var(--peach);
      border-radius: 0 28px 28px 28px;
      padding: 20px 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero p,
    .meta {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .meta {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }

    .screen {
      background: var(--panel);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid var(--line);
      display: grid;
      gap: 14px;
    }

    .screen h2 {
      margin: 0;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: black;
    }

    .bridge { border-top: 12px solid var(--peach); }
    .ops { border-top: 12px solid var(--lilac); }
    .tactical { border-top: 12px solid var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>LCARS Review Pack</h1>
      <p class="meta">This page is a stable Chrome review surface generated from the latest local screenshots.</p>
      <p class="meta">Use this when localhost or direct HTML preview is unreliable.</p>
    </section>

    <section class="screen bridge">
      <div class="tagline">Bridge</div>
      <h2>Bridge Command Nexus</h2>
      <img src="./review-bridge.png" alt="Bridge review screenshot">
    </section>

    <section class="screen ops">
      <div class="tagline">Operations</div>
      <h2>Operations Transfer Bus</h2>
      <img src="./review-ops.png" alt="Operations review screenshot">
    </section>

    <section class="screen tactical">
      <div class="tagline">Tactical</div>
      <h2>Tactical Defense Lattice</h2>
      <img src="./review-tactical.png" alt="Tactical review screenshot">
    </section>
  </div>
</body>
</html>
