<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LCARS Test Runner</title>
  <style>
    body { font-family: Consolas, monospace; background: #111; color: #eee; margin: 0; padding: 16px; }
    iframe { width: 1400px; height: 1200px; border: 1px solid #333; background: white; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>LCARS Test Runner</h1>
  <pre id="results">running...</pre>
  <iframe id="app" src="index.html"></iframe>
  <script>
    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function run() {
      const frame = document.getElementById('app');
      await new Promise((resolve) => frame.addEventListener('load', resolve, { once: true }));
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const results = {
        initial: {},
        interactions: [],
        errors: [],
      };

      win.addEventListener('error', (event) => {
        results.errors.push(String(event.message || event.error || 'unknown error'));
      });

      const capture = (label) => {
        results.interactions.push({
          label,
          title: doc.getElementById('screen-title')?.textContent?.trim(),
          linkMode: doc.getElementById('link-mode')?.textContent?.trim(),
          lastCommand: doc.getElementById('last-command')?.textContent?.trim(),
          alertPhase: doc.getElementById('alert-phase')?.textContent?.trim(),
          activeStations: Array.from(doc.querySelectorAll('.station-button.is-active')).map((el) => el.textContent.trim()),
          firingCount: doc.querySelectorAll('.is-firing').length,
          switching: doc.getElementById('stage-display')?.classList.contains('is-switching'),
          logTop: doc.querySelector('#command-log li')?.textContent?.trim(),
        });
      };

      await wait(300);
      results.initial = {
        title: doc.getElementById('screen-title')?.textContent?.trim(),
        stationCount: doc.querySelectorAll('.station-button').length,
        commandCount: doc.querySelectorAll('.command-button[data-command]').length,
        systemCount: doc.querySelectorAll('.system-button').length,
      };
      capture('initial');

      doc.querySelector('.station-button[data-screen="science"]')?.click();
      await wait(700);
      capture('after science nav');

      doc.querySelector('.command-button[data-command="sensors.sweep"]')?.click();
      await wait(800);
      capture('after sensors command');

      doc.querySelector('.system-button[data-screen="ops"]')?.click();
      await wait(700);
      capture('after ops system nav');

      doc.getElementById('mode-toggle')?.click();
      await wait(250);
      capture('after mode toggle');

      const resultsEl = document.getElementById('results');
      resultsEl.textContent = JSON.stringify(results, null, 2);
      document.title = 'LCARS Test Runner Complete';
    }

    run().catch((error) => {
      document.getElementById('results').textContent = JSON.stringify({ fatal: String(error) }, null, 2);
      document.title = 'LCARS Test Runner Failed';
    });
  </script>
</body>
</html>
